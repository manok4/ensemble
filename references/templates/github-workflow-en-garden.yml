# Installed by /en-setup at .github/workflows/en-garden.yml
# Triggers en-garden on every push to main (i.e., immediately after a PR merges).
# Garden is strictly doc-only and auto-merges its own PRs after en-review clears them.

name: en-garden

on:
  push:
    branches: [main]

permissions:
  contents: write       # to commit doc-only fixes
  pull-requests: write  # to open and auto-merge PRs
  issues: write         # to post comments on the source PR

concurrency:
  group: en-garden-${{ github.ref }}
  cancel-in-progress: false

env:
  ENSEMBLE_GARDEN_DEPTH: 0

jobs:
  garden:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Loop guard 1: skip garden-authored commits
      - name: Skip garden-authored commits
        id: skip-self
        run: |
          AUTHOR='${{ github.event.head_commit.author.name }}'
          MSG='${{ github.event.head_commit.message }}'
          if [ "$AUTHOR" = "ensemble-garden[bot]" ] || [[ "$MSG" == "chore(en-garden):"* ]] || [[ "$MSG" == "chore(arch):"* ]] || [[ "$MSG" == "chore(plans):"* ]] || [[ "$MSG" == "chore(learnings):"* ]] || [[ "$MSG" == "chore(maps):"* ]] || [[ "$MSG" == "chore(docs):"* ]]; then
            echo "Skipping: garden-authored commit"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.skip-self.outputs.skip == 'false'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Loop guard 3: skip if the merge that just happened was a garden-labeled PR
      - name: Skip garden-labeled PR merges
        id: skip-label
        if: steps.skip-self.outputs.skip == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM=$(echo '${{ github.event.head_commit.message }}' | grep -oE '#[0-9]+' | head -1 | tr -d '#' || true)
          if [ -n "$PR_NUM" ]; then
            LABELS=$(gh pr view "$PR_NUM" --json labels -q '.labels[].name' 2>/dev/null || true)
            if echo "$LABELS" | grep -q '^en-garden$'; then
              echo "Skipping: merge of an en-garden-labeled PR"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Set up Bun and tools
        if: steps.skip-self.outputs.skip == 'false' && steps.skip-label.outputs.skip == 'false'
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        if: steps.skip-self.outputs.skip == 'false' && steps.skip-label.outputs.skip == 'false'
        run: |
          # CLI auth: the runner needs ANTHROPIC_API_KEY or CODEX_API_KEY in repo secrets,
          # plus claude or codex CLI on PATH. Customize this step for your install method.
          if ! command -v claude >/dev/null 2>&1 && ! command -v codex >/dev/null 2>&1; then
            echo "ERROR: en-garden requires claude or codex CLI in the runner. See docs/foundation.md §5.2.10."
            exit 1
          fi

      - name: Run en-garden
        if: steps.skip-self.outputs.skip == 'false' && steps.skip-label.outputs.skip == 'false'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENSEMBLE_GARDEN_DEPTH: ${{ env.ENSEMBLE_GARDEN_DEPTH }}
          EN_REVIEW_MODE: report-only
        run: |
          # Loop guard 5: hard cap on recursion depth
          if [ "${ENSEMBLE_GARDEN_DEPTH:-0}" -ge 1 ]; then
            echo "Garden recursion depth cap reached. Skipping."
            exit 0
          fi
          export ENSEMBLE_GARDEN_DEPTH=$(( ${ENSEMBLE_GARDEN_DEPTH:-0} + 1 ))

          # Run garden via the CI wrapper (resolves claude or codex headlessly)
          bin/en-garden-ci

      - name: Post summary on source PR
        if: always() && steps.skip-self.outputs.skip == 'false' && steps.skip-label.outputs.skip == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM=$(echo '${{ github.event.head_commit.message }}' | grep -oE '#[0-9]+' | head -1 | tr -d '#' || true)
          if [ -n "$PR_NUM" ] && [ -f .ensemble/garden-summary.md ]; then
            gh pr comment "$PR_NUM" --body-file .ensemble/garden-summary.md || true
          fi
